<!-- hero.component.html — Full screen hero section -->
<section class="hero">
  <!-- Background image with srcset for responsive loading -->
  <div class="hero__image">
    <picture>
      <source
        type="image/avif"
        srcset="
          images/hero/humbe1-300.avif   300w,
          images/hero/humbe1-600.avif   600w,
          images/hero/humbe1-1200.avif 1200w,
          images/hero/humbe1.avif      2000w
        "
        sizes="100vw"
      />
      <source
        type="image/webp"
        srcset="
          images/hero/humbe1-300.webp   300w,
          images/hero/humbe1-600.webp   600w,
          images/hero/humbe1-1200.webp 1200w
        "
        sizes="100vw"
      />
      <img src="images/hero/humbe1.avif" alt="Felipe Mora Fotografía" />
    </picture>
  </div>

  <!-- Dark overlay for text readability -->
  <div class="hero__overlay"></div>

  <!-- Hero content -->
  <div class="hero__content">
    <p class="hero__subtitle">Capturing moments that last forever</p>
    <h1 class="hero__title">Felipe Ontiveros <em>Fotografía</em></h1>
    <a class="hero__cta" href="#weddings">Ver portafolio</a>
  </div>
</section>
