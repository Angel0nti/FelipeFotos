<section class="hero">
  <div class="hero__image">
    <!-- Only render image when URL is ready -->
    @if (getHeroUrl()) {
      <img [src]="getHeroUrl()" alt="Felipe Ontiveros Fotografía" />
    }
  </div>

  <div class="hero__overlay"></div>

  <div class="hero__content">
    <p class="hero__subtitle">Capturing moments that last forever</p>
    <h1 class="hero__title">Felipe Ontiveros <em>Fotografía</em></h1>
    <a class="hero__cta" href="#weddings">Ver portafolio</a>
  </div>
</section>
